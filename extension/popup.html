<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:320px;background:#0a0e1a;color:#f0f4ff;font-family:Segoe UI,sans-serif;}
.header{background:linear-gradient(135deg,#0066ff,#00ccff);padding:14px 16px;display:flex;align-items:center;gap:8px;}
.header h1{font-size:13px;font-weight:800;letter-spacing:2px;color:white;}
.body{padding:14px;}
.url-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 10px;font-size:10px;color:#94a3b8;word-break:break-all;margin-bottom:12px;min-height:30px;}
.btn{width:100%;padding:11px;background:linear-gradient(135deg,#0066ff,#00ccff);color:white;border:none;border-radius:8px;font-size:12px;font-weight:800;letter-spacing:1px;cursor:pointer;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.loading{text-align:center;padding:12px;color:#00f5ff;font-size:11px;display:none;}
.result{margin-top:12px;display:none;}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.score{font-size:32px;font-weight:800;}
.badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:1px;}
.bar-bg{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-bottom:10px;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
.signal{background:rgba(255,255,255,0.04);border-left:2px solid #00f5ff;padding:5px 8px;margin:3px 0;border-radius:0 6px 6px 0;font-size:10px;color:#c8d4f0;}
.footer{font-size:9px;color:#334155;text-align:center;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);}
</style>
</head>
<body>
<div class="header">
  <span>🛡️</span>
  <h1>PHISHGUARD AI</h1>
</div>
<div class="body">
  <div class="url-box" id="urlBox">Detecting URL...</div>
  <button class="btn" id="btn">⚡ SCAN THIS PAGE</button>
  <div class="loading" id="loading">⚙️ Analyzing signals...</div>
  <div class="result" id="result">
    <div class="top">
      <div>
        <div style="font-size:9px;color:#6b7a9e;letter-spacing:2px;margin-bottom:2px;">RISK SCORE</div>
        <div class="score" id="score">0%</div>
      </div>
      <div class="badge" id="badge">SAFE</div>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
    <div id="signals"></div>
    <div class="footer">PhishGuard AI v2.0</div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
